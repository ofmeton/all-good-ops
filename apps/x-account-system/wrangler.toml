# ====================================================================
# Cloudflare Workers 設定 — x-account-system Phase 1 deploy 準備
#
# 設計 SSOT: outputs/improvements/x-account-design-consolidated/main-design-all-versions.md
#   - L783  runtime = MA (Anthropic Managed Agents) + Cloudflare Workers
#   - L1098 LINE Webhook → Cloudflare Worker → MA Interviewer Session → LINE reply
#   - L556-582 Phase 1 投稿タイムテーブル
#
# Phase 1 方針:
#   - 「人間承認つき 1 投稿/日」。scheduled() は draft 生成 + LINE 承認依頼まで。
#     自律 live 投稿はしない (承認後 fetch ハンドラ経由で publish)。
#   - Python ジョブ (fetch-github-trending.py / relabel-tweets.py) は Workers では
#     動かないため launchd or GitHub Actions で別運用 → DEPLOY.md 参照。
#
# 反映手順 / secret 投入: apps/x-account-system/DEPLOY.md
# ====================================================================

name = "ofmeton-x-account"
main = "src/worker.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# --------------------------------------------------------------------
# モジュール alias: @anthropic-ai/sdk(0.101) の self-hosted agent-toolset が
# 静的 import graph 経由で node:fs/node:fs/promises/node:child_process を
# bundle に持ち込む。本 worker は cloud Managed Agents + SSE のみ使用し当該
# コードは実行されない (task1 実証) ため空 stub に置換して bundle から除外。
# workerd は node:child_process 非対応。本番自前コードは node:fs/child_process
# 不使用 (使用は *.test.ts のみ=bundle 対象外)。詳細: src/stubs/node-empty.js
# --------------------------------------------------------------------
[alias]
"node:child_process" = "./src/stubs/node-empty.js"
"node:fs" = "./src/stubs/node-empty.js"
"node:fs/promises" = "./src/stubs/node-empty.js"

# 観測性 (設計 §observability、cron run を root span として記録)
[observability]
enabled = true

# --------------------------------------------------------------------
# Queues (xad-jobs producer/consumer + DLQ)
# --------------------------------------------------------------------
[[queues.producers]]
queue = "xad-jobs"
binding = "JOBS"

[[queues.consumers]]
queue = "xad-jobs"
max_batch_size = 1
max_retries = 3
# MAX_ATTEMPTS(=1+max_retries)=4 は src/queue.ts と二重管理。変更時は両方
dead_letter_queue = "xad-jobs-dlq"

# --------------------------------------------------------------------
# Cron Triggers (Cloudflare は UTC 指定。JST = UTC+9)
# 投稿頻度: チャエン実測リズム = 5〜7投稿/日 (朝6-8 / 昼12 / 夕15-17 を主軸)。
# P1/P2 で X API 直投を廃止し chrome-devtools 予約投稿に移行したため、
# 旧「X API 100/月上限 → 投稿 cron 3 本」制約は解消。生成 cron を 6 本に拡張。
# (各 cron は draft 生成 + LINE 承認依頼のみ。実投稿は人の承認 → 予約投稿)。
# --------------------------------------------------------------------
# | JST       | UTC          | ジョブ                                      |
# |-----------|--------------|---------------------------------------------|
# | 06:00     | 21:00 (前日) | buzz-ingest (海外X buzz 日次, 素材収集を最初に) |
# | 06:30     | 21:30 (前日) | ideation (materials→core_ideas LLM生成, buzzの後)|
# | 07:00     | 22:00 (前日) | post-morning (朝ピーク1)                     |
# | 08:00     | 23:00 (前日) | post-morning2 (朝ピーク2)                    |
# | 12:00     | 03:00        | post-noon (昼ピーク)                         |
# | 15:00     | 06:00        | post-afternoon (夕ピーク1)                   |
# | 17:00     | 08:00        | post-afternoon2 (夕ピーク2)                  |
# | 19:00     | 10:00        | post-evening (note 送客, URL末尾)            |
# | 21:00     | 12:00        | daily-digest (LINE 配信)                    |
# | 23:00     | 14:00        | optimizer-update (posterior 更新)           |
# | 毎2h      | */2          | rollback-monitor (異常検知)                 |
# | 月曜 09:00 | 00:00 (Mon)  | inspirations-ingest (週次)                  |
# | 毎月1日 00:00| 15:00 (1日) | rotation-notice (token rotation 通知)       |
[triggers]
crons = [
  "30 20 * * *",   # 05:30 JST collect (収集エージェント・最初に)
  "0 21 * * *",    # 06:00 JST buzz-ingest
  "30 21 * * *",   # 06:30 JST ideation (buzz の後で素材→ネタ変換)
  "0 22 * * *",    # 07:00 JST post-morning (朝ピーク1)
  "0 23 * * *",    # 08:00 JST post-morning2 (朝ピーク2)
  "0 3 * * *",     # 12:00 JST post-noon (昼ピーク)
  "0 6 * * *",     # 15:00 JST post-afternoon (夕ピーク1)
  "0 8 * * *",     # 17:00 JST post-afternoon2 (夕ピーク2)
  "0 10 * * *",    # 19:00 JST post-evening (note 送客)
  "0 12 * * *",    # 21:00 JST daily-digest
  "0 14 * * *",    # 23:00 JST optimizer-update
  "0 */2 * * *",   # rollback-monitor 毎2h
  "0 0 * * 1",     # 月曜 09:00 JST inspirations-ingest
  "0 15 1 * *",    # 毎月1日 rotation-notice
]

# --------------------------------------------------------------------
# KV Namespaces
# --------------------------------------------------------------------
# xad-oauth-state: PKCE state→verifier の一時保存 (TTL 300s で自動削除)
[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "e848abee83b046bdba9b372d7b7b7609"

# --------------------------------------------------------------------
# 環境変数 (非機密のみ。機密は `wrangler secret put` で投入 → DEPLOY.md)
# --------------------------------------------------------------------
[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"
OPENAI_IMAGE_MODEL = "gpt-image-2"
ANTHROPIC_ZDR_ENABLED = "false"
BUDGET_MONTHLY_LIMIT_JPY = "10000"
BUDGET_BROWNOUT_THRESHOLD_JPY = "11500"
# Phase 1 は人間承認必須。自律 live 投稿を恒久ブロックするフラグ。
PHASE = "1"
AUTONOMOUS_PUBLISH = "false"
SUPABASE_SCHEMA = "xad"

# 機密 (wrangler secret put で投入。ここには値を書かない):
#   ANTHROPIC_API_KEY / OPENAI_API_KEY
#   X_CLIENT_ID / X_CLIENT_SECRET / X_ACCESS_TOKEN / X_REFRESH_TOKEN
#   OAUTH_ADMIN_SECRET (gates /oauth/x/start — fail closed if unset)
#   TWITTERAPI_IO_KEY
#   META_APP_ID / META_APP_SECRET / IG_ACCESS_TOKEN / IG_BUSINESS_ACCOUNT_ID
#   SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY
#   LINE_CHANNEL_ACCESS_TOKEN / LINE_CHANNEL_SECRET / LINE_USER_ID_OFMETON
