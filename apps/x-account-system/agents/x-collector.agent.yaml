# x-collector.agent.yaml — 永続 Managed Agent の seed マニフェスト（収集Ag・explore）
#
# bootstrap-ma-agents がこれを読んで Anthropic 側に永続 agent を create/update し、
# xad.ma_agents に登録する。collector.ts の **explore ループ**が registry の
# agent_key="x-collector" を引いて永続 session を起動する（候補ツイートの探索）。
# scoring / translation の batch は agentic でないため MA 化せず messages.create のまま。
#
# プロンプト原文・tool 実体は重複させない。system_builder / tool 種別キーが指す SSOT は
# lib/ingest/collector-prompts.ts（buildExploreSystemPrompt）/ collector-tools.ts。

key: x-collector                    # ma_agents.agent_key（registry 引き当てキー）
name: x-collector                   # Anthropic 側 agent 表示名
model: claude-sonnet-4-5            # 探索の判断（collector-config.scoringModel と整合）
system_builder: buildExploreSystemPrompt  # lib/ma/bootstrap-core.ts SYSTEM_BUILDERS の識別子
tools:                              # MA_TOOL_REGISTRY の種別キー
  - collector_tools                 # search_tweets/get_trends/search_users/get_user_followings/get_thread（5 custom）
  - web_toolset                     # web_search / web_fetch（補助の裏取り）
